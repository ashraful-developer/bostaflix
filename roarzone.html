<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jadoo | Buddy✘TV</title>
    
    <link rel="stylesheet" type="text/css" href="style.css">
    <!-- Clappr Player Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/clappr@latest/dist/clappr.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/level-selector@0.2.0/dist/level-selector.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@clappr/hlsjs-playback@1.0.1/dist/hlsjs-playback.min.js"></script>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden;
  }

  #player {
    width: 100%;
    height: 100%;
    position: absolute;
    top: 0;
    left: 0;
  }

  /* When screen width is below 400px, scale down entire page */
  @media (max-width: 400px) {
    body {
      transform: scale(0.8);
      transform-origin: top left;
      width: 125%;   /* compensate for scaling shrink */
      height: 125%;
    }
  }
</style>
<script>
    let blockEmbed = false;
    try {
        if (window !== window.top && window.top.location.hostname !== window.location.hostname) {
            blockEmbed = true;
        }
    } catch (e) {
        blockEmbed = true;
    }

    if (blockEmbed) {
        document.addEventListener("DOMContentLoaded", function () {
            document.body.innerHTML = `
                <div style="color:white;text-align:center;margin-top:20%;">
                    <h1>403 Forbidden</h1>
                    <p>You cannot embed this page in a cross-origin iframe.</p>
                </div>
            `;
        });
    }
</script>
</head>
<body>
    <div id="player"></div>
<script>
function getQueryParam(name) {
    const urlParams = new URLSearchParams(window.location.search);
    return urlParams.get(name);
}

async function loadM3UAndPlay(channelId) {
    const m3uUrl = "https://private-zone-by-xfireflix.pages.dev/playlist-isp-bdix.m3u";

    try {
        const res = await fetch(m3uUrl);
        const text = await res.text();

        const lines = text.split("\n");

        let foundUrl = null;

        for (let i = 0; i < lines.length; i++) {
            let line = lines[i].toLowerCase();

            // match by keyword (tsports)
            if (line.includes(channelId.toLowerCase())) {
                // next non-comment line is the stream URL
                for (let j = i + 1; j < lines.length; j++) {
                    if (lines[j].startsWith("http")) {
                        foundUrl = lines[j].trim();
                        break;
                    }
                }
            }

            if (foundUrl) break;
        }

        if (foundUrl) {
            createPlayer(foundUrl);
        } else {
            console.error("Channel not found");
        }

    } catch (err) {
        console.error("Failed to load M3U:", err);
    }
}

// INIT
var channelId = getQueryParam('id');

if (channelId) {
    loadM3UAndPlay(channelId);
} else {
    console.error("No channel ID provided");
}
</script>
</body>
</html>
