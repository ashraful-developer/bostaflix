<script>
// ===== SETTINGS =====
const M3U_URL = "https://private-zone-by-xfireflix.pages.dev/playlist-isp-bdix.m3u";

// ===== HELPERS =====
function getQueryParam(name) {
    return new URLSearchParams(window.location.search).get(name);
}

// ===== PLAYER =====
let player;

function createPlayer(sourceUrl) {
    if (player) {
        player.destroy();
    }

    player = new Clappr.Player({
        source: sourceUrl,
        width: '100%',
        height: '100%',
        autoPlay: true,
        plugins: [HlsjsPlayback, LevelSelector],
        mimeType: "application/x-mpegURL",
        parentId: "#player",
        mediacontrol: {
            seekbar: "#ff0000",
            buttons: "#eee"
        }
    });

    player.on(Clappr.Events.PLAYER_STOP, function() {
        player.play();
    });
}

// ===== LOAD M3U =====
async function loadM3U(channelId) {

    try {
        const res = await fetch(M3U_URL);

        if (!res.ok) {
            throw new Error("Failed to load playlist");
        }

        const text = await res.text();
        const lines = text.split("\n");

        let streamUrl = null;

        for (let i = 0; i < lines.length; i++) {
            const line = lines[i].toLowerCase();

            if (line.includes(channelId.toLowerCase())) {
                for (let j = i + 1; j < lines.length; j++) {
                    if (lines[j].trim().startsWith("http")) {
                        streamUrl = lines[j].trim();
                        break;
                    }
                }
            }

            if (streamUrl) break;
        }

        if (!streamUrl) {
            document.body.innerHTML = `
                <div style="color:white;text-align:center;margin-top:20%;">
                    <h2>Channel not found</h2>
                    <p>${channelId}</p>
                </div>
            `;
            return;
        }

        console.log("Found stream:", streamUrl);
        createPlayer(streamUrl);

    } catch (err) {
        console.error(err);

        document.body.innerHTML = `
            <div style="color:white;text-align:center;margin-top:20%;">
                <h2>Failed to load playlist</h2>
            </div>
        `;
    }
}

// ===== INIT =====
const channelId = getQueryParam("id");

if (channelId) {
    loadM3U(channelId);
} else {
    document.body.innerHTML = `
        <div style="color:white;text-align:center;margin-top:20%;">
            <h2>No Channel ID</h2>
            <p>Use: ?id=tsports</p>
        </div>
    `;
}
</script>
